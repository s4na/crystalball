.cache: &cache
  key:
    prefix: bundle
    files:
      - Gemfile.lock
  paths:
    - $BUNDLE_PATH
  policy: pull

default:
  image: registry.gitlab.com/gitlab-org/gitlab-build-images/ci/debian-bookworm-slim-ruby-3.4.3:rubygems-3.6-git-2.49
  cache: *cache
  before_script:
    - bundle install

variables:
  BUNDLE_PATH: vendor/bundle
  BUNDLE_SILENCE_ROOT_WARNING: 1

workflow:
  rules:
    - if: $CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

stages:
  - lint
  - test

cache-gems:
  stage: .pre
  script:
    - echo "Cached ruby gems"
  cache:
    <<: *cache
    policy: pull-push

rubocop:
  stage: lint
  script:
    - bundle exec rubocop --color

rspec:
  stage: test
  script:
    - bundle exec rspec --force-color spec
  coverage: '/Line Coverage: (\d+\.\d+%) \(.*\)$/'
