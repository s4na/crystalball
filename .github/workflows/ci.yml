name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rubocop:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true
      - run: bundle exec rubocop --color

  rspec:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ruby-version: ['2.7', '3.0', '3.1', '3.2', '3.3', '3.4']
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby-version }}
          bundler-cache: true
      - name: Remove Gemfile.lock for older Rubies
        if: matrix.ruby-version == '2.7' || matrix.ruby-version == '3.0'
        run: rm -f Gemfile.lock
      - name: Bundle install
        if: matrix.ruby-version == '2.7' || matrix.ruby-version == '3.0'
        run: bundle install
      - run: bundle exec rspec --force-color spec
